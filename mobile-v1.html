<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Mobile</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Top Banner */
    .top-banner {
      background: #0B1F3F;
      color: white;
      text-align: center;
      font-size: 0.7rem;
      padding: 0.25rem 0.4rem;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
    }

    /* Navigation */
    nav {
      background: white;
      border-bottom: 1px solid #eee;
      padding: 0.7rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 20px; /* right under the banner */
      left: 0;
      width: 100%;
      z-index: 19;
    }

    nav .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: bold;
      color: #111;
      letter-spacing: 1px;
    }

    nav .menu {
      font-size: 0.9rem;
      color: #333;
    }

    /* Hero Sections */
    .hero,
    .hero-2 {
      position: relative;
      width: 100%;
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin-top: 70px; /* to push below nav */
    }

    .hero video,
    .hero-2 video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(0.55);
      z-index: 1;
    }

    .hero-text-1,
    .hero-text-2 {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 1rem;
    }

    .hero-text-1 h1,
    .hero-text-2 h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: white;
      margin-bottom: 0.8rem;
    }

    .hero-text-1 p {
      font-size: 0.85rem;
      color: #eee;
      line-height: 1.4;
      margin-bottom: 1.2rem;
    }

    /* Ralph Lauren style button */
    .btn {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border: 1px solid white;
      background: transparent;
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: white;
      color: #111;
    }

    /* Slider Section */
    .slider {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 65vh;
      margin: 1rem 0;
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease-in-out;
      width: 200%;
    }

    .slide {
      flex: 0 0 100%;
      height: 65vh;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Dots for slider */
    .dots {
      text-align: center;
      position: absolute;
      bottom: 10px;
      width: 100%;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin: 0 4px;
      background: #ccc;
      border-radius: 50%;
      cursor: pointer;
    }

    .dot.active {
      background: #111;
    }

    /* Popup Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 350px;
      border-radius: 12px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      background: #111;
      padding: 1rem;
    }

    .modal-content h2 {
      font-size: 18px;
      font-weight: 500;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Top Banner -->
  <header class="top-banner">
    <p>Free shipping on orders over $200. <a href="#" class="popup-trigger">Learn More</a></p>
  </header>

  <!-- Navigation -->
  <nav>
    <div class="logo">Vione Hernal</div>
    <div class="menu">Menu</div>
  </nav>

  <!-- Hero Section 1 -->
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-2.mp4" type="video/mp4">
    </video>
    <div class="hero-text-1">
      <h1>Timeless Elegance</h1>
      <p>Fashion meets innovation. Every piece authenticated and verified through blockchain.</p>
      <a href="#" class="btn popup-trigger">Explore Collection</a>
    </div>
  </section>

  <!-- Image Slider Section -->
  <section class="slider">
    <div class="slides" id="slides">
      <div class="slide">
        <img src="images/model/model-1.jpg" alt="Model 1">
      </div>
      <div class="slide">
        <img src="images/model/model-2.jpg" alt="Model 2">
      </div>
    </div>
    <div class="dots">
      <span class="dot active" onclick="moveSlide(0)"></span>
      <span class="dot" onclick="moveSlide(1)"></span>
    </div>
  </section>

  <!-- Hero Section 2 -->
  <section class="hero-2">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-3.mp4" type="video/mp4">
    </video>
    <div class="hero-text-2">
      <h2>Vione Hernal</h2>
    </div>
  </section>

  <!-- Popup Modal -->
  <div class="modal" id="fashionModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <h2>Luxury Fashion</h2>
    </div>
  </div>

  <script>
    // Modal
    const modal = document.getElementById('fashionModal');
    const closeBtn = document.getElementById('closeModal');
    const triggers = document.querySelectorAll('.popup-trigger');

    triggers.forEach(trigger => {
      trigger.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = 'flex';
      });
    });

    closeBtn.addEventListener('click', () => modal.style.display = 'none');

    // Slider
    let currentIndex = 0;
    const slides = document.getElementById('slides');
    const dots = document.querySelectorAll('.dot');

    function moveSlide(index) {
      currentIndex = index;
      slides.style.transform = `translateX(-${index * 100}%)`;
      dots.forEach(dot => dot.classList.remove('active'));
      dots[index].classList.add('active');
    }
  </script>
</body>

</html>
