<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Luxury Collection</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Raleway', sans-serif;
      background: #f9f9f9;
      color: #111;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin: 0;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px 0;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-weight: 500;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
      background: #f2f2f2;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 14px;
      color: #555;
    }

    /* Image Slider */
    .bottom-boxes {
      padding: 20px;
    }

    .image-slider {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
      border-radius: 10px;
      background: #000;
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease-in-out;
      height: 100%;
    }

    .slide {
      min-width: 100%;
      height: 100%;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Controls */
    .slider-controls button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 50%;
      font-size: 18px;
    }

    .slider-controls .prev { left: 10px; }
    .slider-controls .next { right: 10px; }

    /* Dots */
    .dots {
      text-align: center;
      position: absolute;
      bottom: 10px;
      width: 100%;
    }

    .dot {
      height: 10px;
      width: 10px;
      margin: 0 4px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      cursor: pointer;
    }

    .dot.active { background-color: #717171; }
  </style>
</head>
<body>
  <header>
    <h1>Vione Hernal</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Collection</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <h2>Luxury Reimagined</h2>
    <p>Discover the elegance of modern fashion infused with timeless design.</p>
  </section>

  <!-- Boxes -->
  <section class="bottom-boxes">
    <div class="image-slider">
      <div class="slides">
        <!-- Existing model slides -->
        <div class="slide">
          <img src="images/model/model-1.jpg" alt="Right Box Model">
        </div>
        <div class="slide">
          <img src="images/model/model-2.jpg" alt="Left Box Model">
        </div>

        <!-- 🔥 Added extra model images here -->
        <div class="slide">
          <img src="images/model/model-3.jpg" alt="Additional Model 3">
        </div>
        <div class="slide">
          <img src="images/model/model-4.jpg" alt="Additional Model 4">
        </div>
      </div>
      <div class="slider-controls">
        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>
      </div>
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </section>

  <script>
    // Simple slider
    const slides = document.querySelector(".slides");
    const slideImages = document.querySelectorAll(".slide");
    const prevBtn = document.querySelector(".prev");
    const nextBtn = document.querySelector(".next");
    const dots = document.querySelectorAll(".dot");

    let currentIndex = 0;

    function showSlide(index) {
      if (index < 0) index = slideImages.length - 1;
      if (index >= slideImages.length) index = 0;
      slides.style.transform = `translateX(-${index * 100}%)`;
      currentIndex = index;

      dots.forEach(dot => dot.classList.remove("active"));
      dots[index].classList.add("active");
    }

    prevBtn.addEventListener("click", () => showSlide(currentIndex - 1));
    nextBtn.addEventListener("click", () => showSlide(currentIndex + 1));
    dots.forEach((dot, i) => dot.addEventListener("click", () => showSlide(i)));

    showSlide(0);
  </script>
</body>
</html>
