<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Mobile Fix</title>
</head>

<style>
  /* Hero Video */
  .hero {
    position: relative;
    width: 100%;
    height: auto;
    /* height adjusts automatically */
  }

  .hero video {
    width: 100%;
    height: auto;
    object-fit: cover;
    /* no white space */
  }

  .hero-text-1 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
    padding: 0 1rem;
  }

  /* Image Slider Manual Swipe */
  .image-slider {
    overflow-x: scroll;
    display: flex;
    scroll-snap-type: x mandatory;
  }

  .image-slider .slides {
    display: flex;
  }

  .image-slider img {
    width: 100%;
    flex-shrink: 0;
    scroll-snap-align: start;
    border-radius: 0;
    /* remove radius */
  }

  /* Optional dots (manual update on swipe if needed) */
  .slider-dots {
    display: flex;
    justify-content: center;
    margin: 5px 0;
  }

  /* Section text */
  .section {
    padding: 1rem;
    text-align: center;
  }

  /* Bottom video */
  .bottom-boxes .box video {
    width: 100%;
    height: auto;
    object-fit: cover;
  }
</style>

<body>
  <!-- Banner -->
  <header class="top-banner">
    <p>Free shipping on orders over $200. <a href="#" class="popup-trigger">Learn More</a></p>
  </header>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Vione Hernal</div>
    <div class="nav-icons">
      <a href="#" class="popup-trigger">&#128269;</a>
      <a href="#" class="popup-trigger">&#128722;</a>
    </div>
  </nav>

  <!-- Hero Video -->
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto" id="hero-video-1">
      <source src="background/loop/loop-background-2.mp4" type="video/mp4">
    </video>
    <div class="hero-text-1">
      <h1>Timeless Elegance</h1>
      <p>Fashion meets innovation. Authenticated through blockchain. A new era of exclusivity is coming!</p>
      <a href="#" class="btn popup-trigger">Explore</a>
    </div>
  </section>

  <!-- Image Slider -->
  <section class="image-slider">
    <div class="slides">
      <img src="images/slider1.jpg" alt="">
      <img src="images/slider2.jpg" alt="">
    </div>
    <!-- optional manual navigation dots -->
    <div class="slider-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>
  </section>

  <!-- Section Text -->
  <section class="section">
    <h2>Beyond the Ordinary</h2>
    <p>Every detail tells a story—of vision, precision, and timeless sophistication.</p>
  </section>

  <!-- Bottom Video -->
  <section class="bottom-boxes">
    <div class="box">
      <video autoplay muted loop playsinline preload="auto">
        <source src="background/loop/loop-background-4.mp4" type="video/mp4">
      </video>
    </div>
  </section>


</body>

<script>

  const modal = document.getElementById('fashionModal');
const closeBtn = document.getElementById('closeModal');
const triggers = document.querySelectorAll('.popup-trigger');

triggers.forEach(trigger => {
  trigger.addEventListener('click', (e) => {
    e.preventDefault();
    modal.style.display = 'flex';
  });
});

closeBtn.addEventListener('click', () => modal.style.display = 'none');
window.addEventListener('click', e => {
  if (e.target === modal) modal.style.display = 'none';
});

</script>

</html>
