<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Mobile Fix</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      display: none;
    }

    /* Hide top banner on mobile for space */

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 15;
    }

    .navbar .logo {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-icons a {
      margin-left: 10px;
      font-size: 1rem;
      text-decoration: none;
      color: #111;
    }

    /* Hero video */
    .hero,
    .hero-2,
    .bottom-video {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .hero video,
    .hero-2 video,
    .bottom-video video {
      width: 100%;
      height: auto;
      min-height: 55vh;
      object-fit: cover;
      display: block;
    }

    /* Compact spacing */
    .bottom-boxes {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin: 0.2rem 0;
      padding: 0;
    }

    /* Slider */
    .luxury-slider {
      position: relative;
      width: 100%;
      height: 50vw;
      margin: 0.2rem 0;
      overflow: hidden;
    }

    .luxury-slider .slides {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .luxury-slider .slide {
      flex: 0 0 85%;
      margin-right: 5%;
      border-radius: 8px;
      overflow: hidden;
    }

    .luxury-slider .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Progress bar */
    .luxury-slider .progress {
      width: 70%;
      height: 2px;
      background: rgba(0, 0, 0, 0.2);
      margin: 6px auto;
      border-radius: 2px;
    }

    .luxury-slider .progress .bar {
      height: 100%;
      width: 50%;
      background: #111;
      transform-origin: left;
      transition: transform 0.5s ease-in-out;
    }

    .section {
      padding: 0.4rem;
      text-align: center;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .section p {
      font-size: 0.8rem;
      color: #444;
      line-height: 1.2;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Vione Hernal</div>
    <div class="nav-icons">
      <a href="#">&#128269;</a>
      <a href="#">&#128722;</a>
    </div>
  </nav>

  <!-- First Video -->
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-2.mp4" type="video/mp4">
    </video>
  </section>

  <!-- Image Slider -->
  <section class="luxury-slider">
    <div class="slides" id="luxurySlides">
      <div class="slide"><img src="images/model/model-1.jpg" alt="Model 1"></div>
      <div class="slide"><img src="images/model/model-2.jpg" alt="Model 2"></div>
    </div>
    <div class="progress">
      <div class="bar" id="progressBar"></div>
    </div>
  </section>

  <!-- Last Video -->
  <section class="bottom-video">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-5.mp4" type="video/mp4">
    </video>
  </section>

  <!-- Section text -->
  <section class="section">
    <h2>Beyond the Ordinary</h2>
    <p>Every detail tells a story—of vision, precision, and timeless sophistication.</p>
  </section>

  <script>
    // Luxury slider
    const slides = document.getElementById('luxurySlides');
    const bar = document.getElementById('progressBar');
    const total = slides.children.length;
    let current = 0;

    function goTo(i) {
      current = (i + total) % total; // loop
      slides.style.transform = `translateX(-${current * 90}%)`;
      bar.style.transform = `scaleX(${(current + 1) / total})`;
    }

    // Auto-loop every 4s
    setInterval(() => { goTo(current + 1); }, 4000);

    // Touch swipe
    let startX = 0;
    slides.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
    slides.addEventListener('touchend', e => {
      let dx = e.changedTouches[0].clientX - startX;
      if (dx < -30) goTo(current + 1);
      if (dx > 30) goTo(current - 1);
    });

    goTo(0);
  </script>

</body>

</html>
