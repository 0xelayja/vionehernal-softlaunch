<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Mobile Fix</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
    }

    /* Top Banner */
    .top-banner {
      width: 100%;
      background-color: #0B1F3F;
      color: #fff;
      text-align: center;
      padding: 6px 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 28px;
      /* below top banner */
      z-index: 15;
    }

    .navbar .logo {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-icons a {
      margin-left: 10px;
      font-size: 1rem;
      text-decoration: none;
      color: #111;
    }

    /* Hero video */
    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
      height: 55vh;
    }

    .hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      z-index: 2;
      padding: 0 10px;
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .hero-text p {
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.4;
    }

    /* Slider */
    .luxury-slider {
      position: relative;
      width: 100%;
      margin: 0.5rem 0;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .luxury-slider .slides {
      display: flex;
      gap: 5%;
    }

    .luxury-slider .slide {
      flex: 0 0 90%;
      scroll-snap-align: center;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .luxury-slider .slide img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }

    /* Section text */
    .section {
      padding: 0.4rem 0.2rem;
      text-align: center;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      margin-bottom: 0.3rem;
      color: #111;
    }

    .section p {
      font-size: 0.8rem;
      color: #444;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    /* Last video */
    .bottom-video {
      position: relative;
      width: 100%;
      height: 55vh;
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .bottom-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <!-- Top Banner -->
  <header class="top-banner">
    Free shipping on orders over ₱5,000!
  </header>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Vione Hernal</div>
    <div class="nav-icons">
      <a href="#">&#128269;</a>
      <a href="#">&#128722;</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-2.mp4" type="video/mp4">
    </video>
    <div class="hero-text">
      <h1>Timeless Elegance</h1>
      <p>Luxury fashion redefined for the modern world.</p>
    </div>
  </section>

  <!-- Slider -->
  <section class="luxury-slider">
    <div class="slides">
      <div class="slide"><img src="images/model/model-1.jpg" alt="Model 1"></div>
      <div class="slide"><img src="images/model/model-2.jpg" alt="Model 2"></div>
    </div>
  </section>

  <!-- Section text -->
  <section class="section">
    <h2>Beyond the Ordinary</h2>
    <p>Every detail tells a story—of vision, precision, and timeless sophistication.</p>
  </section>

  <!-- Last Video -->
  <section class="bottom-video">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-3.mp4" type="video/mp4">
    </video>
  </section>

</body>

</html>
