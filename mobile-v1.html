<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Mobile</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Top Banner */
    .top-banner {
      background: #0B1F3F;
      color: white;
      text-align: center;
      font-size: 0.7rem;
      padding: 0.25rem 0.4rem;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
    }

    .top-banner a {
      color: #FFD700;
      text-decoration: underline;
    }

    /* Hero Sections */
    .hero, .hero-2 {
      position: relative;
      width: 100%;
      height: 70vh; /* both videos same size */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .hero video, .hero-2 video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(0.55);
      z-index: 1;
    }

    .hero-text-1, .hero-text-2 {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 1rem;
    }

    .hero-text-1 h1, .hero-text-2 h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: white;
      margin-bottom: 0.8rem;
    }

    .hero-text-1 p {
      font-size: 0.85rem;
      color: #eee;
      line-height: 1.4;
      margin-bottom: 1.2rem;
    }

    /* Model Boxes */
    .model-boxes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .model-box {
      position: relative;
      width: 100%;
      height: 50vh;
      overflow: hidden;
      border-radius: 10px;
    }

    .model-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Popup Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 350px;
      border-radius: 12px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      background: #111;
      padding: 1rem;
    }

    .modal-content img {
      position: relative;
      z-index: 2;
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }

    .modal-content h2 {
      position: relative;
      z-index: 2;
      font-size: 18px;
      font-weight: 500;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      color: white;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Top Banner -->
  <header class="top-banner">
    <p>Free shipping on orders over $200. <a href="#" class="popup-trigger">Learn More</a></p>
  </header>

  <!-- Hero Section 1 -->
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-2.mp4" type="video/mp4">
    </video>
    <div class="hero-text-1">
      <h1>Timeless Elegance</h1>
      <p>Discover the essence of modern luxury with Vione Hernal.</p>
    </div>
  </section>

  <!-- Model Boxes -->
  <section class="model-boxes">
    <div class="model-box left-box">
      <img src="model/model-1.jpg" alt="Model 1">
    </div>
    <div class="model-box right-box">
      <img src="model/model-2.jpg" alt="Model 2">
    </div>
  </section>

  <!-- Hero Section 2 -->
  <section class="hero-2">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-3.mp4" type="video/mp4">
    </video>
    <div class="hero-text-2">
      <h2>Vione Hernal</h2>
    </div>
  </section>

  <!-- Popup Modal -->
  <div class="modal" id="fashionModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <img src="background/smoke/smoke-background.gif" alt="Smoke Background">
      <h2>Luxury Fashion</h2>
    </div>
  </div>

  <script>
    const modal = document.getElementById('fashionModal');
    const closeBtn = document.getElementById('closeModal');
    const triggers = document.querySelectorAll('.popup-trigger');

    triggers.forEach(trigger => {
      trigger.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = 'flex';
      });
    });

    closeBtn.addEventListener('click', () => modal.style.display = 'none');
  </script>
</body>
</html>
