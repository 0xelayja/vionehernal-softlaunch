<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vione Hernal | Mobile</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Banner */
    .top-banner {
      background: #0B1F3F;
      color: white;
      text-align: center;
      font-size: 0.7rem;
      padding: 0.25rem 0.4rem;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 20;
    }

    .top-banner a {
      color: white;
      font-weight: 500;
      text-decoration: underline;
    }


    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.95);
      position: fixed;
      top: 1.5rem;
      width: 100%;
      z-index: 15;
    }

    .navbar .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 400;
      color: #111;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
    }

    .nav-icons a {
      font-size: 1.2rem;
      margin-left: 10px;
      color: #111;
      text-decoration: none;
    }


    /* Hero Sections */
    .hero,
    .hero-2 {
      position: relative;
      width: 100%;
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      margin-top: 84px;
      /* pushes below nav */
    }

    .hero video,
    .hero-2 video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(0.55);
      z-index: 1;
    }

    .hero-text-1,
    .hero-text-2 {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 1rem;
    }

    .hero-text-1 h1,
    .hero-text-2 h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: white;
      margin-bottom: 0.8rem;
    }

    .hero-text-1 p {
      font-size: 0.85rem;
      color: #eee;
      line-height: 1.4;
      margin-bottom: 1.2rem;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      font-size: 0.85rem;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Slider Section */
    .slider {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 60vh;
      margin: 1.5rem 0;
    }

    .slides {
      display: flex;
      width: 200%;
      height: 100%;
      transition: transform 0.5s ease;
    }

    .slide {
      width: 100%;
      height: 100%;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slider-controls {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
      padding: 0 1rem;
    }

    .slider-controls span {
      font-size: 2rem;
      color: white;
      cursor: pointer;
      user-select: none;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 3000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 350px;
      border-radius: 12px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      background: #111;
      padding: 1rem;
    }

    .modal-content img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }

    .modal-content h2 {
      font-size: 18px;
      font-weight: 500;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header class="top-banner">
    <p>Free shipping on orders over $200. <a href="#" class="popup-trigger">Learn More</a></p>
  </header>


  <!-- Navbar -->
  <nav class="navbar">
    <!-- Left side links -->
    <div class="nav-left">
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
    </div>

    <!-- Center logo -->
    <div class="logo">Vione Hernal</div>

    <!-- Right side icons -->
    <div class="nav-icons">
      <a href="#" class="popup-trigger">&#128269;</a> <!-- Search -->
      <a href="#" class="popup-trigger">&#128722;</a> <!-- Cart -->
      <a href="#">Sign In</a>
    </div>
  </nav>


  <!-- Hero Section 1 -->
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-2.mp4" type="video/mp4">
    </video>
    <div class="hero-text-1">
      <h1>Timeless Elegance</h1>
      <p>Fashion meets innovation. Every piece authenticated and verified through blockchain. A new era of exclusivity
        is coming!</p>
      <a href="#" class="btn popup-trigger" data-img="images/model/model-2.jpg">Explore Collection</a>
    </div>
  </section>

  <!-- Image Slider -->
  <div class="slider">
    <div class="slides" id="slides">
      <div class="slide"><img src="images/model/model-1.jpg" alt="Model 1"></div>
      <div class="slide"><img src="images/model/model-2.jpg" alt="Model 2"></div>
    </div>
    <div class="slider-controls">
      <span id="prev">&#10094;</span>
      <span id="next">&#10095;</span>
    </div>
  </div>

  <!-- Hero Section 2 -->
  <section class="hero-2">
    <video autoplay muted loop playsinline preload="auto">
      <source src="background/loop/loop-background-3.mp4" type="video/mp4">
    </video>
    <div class="hero-text-2">
      <h2>Vione Hernal</h2>
    </div>
  </section>

  <!-- Popup Modal -->
  <div class="modal" id="fashionModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <img id="modalImage" src="" alt="Popup Preview">
      <h2>Luxury Fashion</h2>
    </div>
  </div>

  <script>
    /* Drawer */
    const drawer = document.getElementById('drawerMenu');
    const overlay = document.getElementById('overlay');
    document.getElementById('openDrawer').addEventListener('click', () => {
      drawer.classList.toggle('open');
      overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', () => {
      drawer.classList.remove('open');
      overlay.classList.remove('show');
    });

    /* Slider */
    let index = 0;
    const slides = document.getElementById('slides');
    document.getElementById('next').addEventListener('click', () => {
      index = (index + 1) % 2;
      slides.style.transform = `translateX(-${index * 100}%)`;
    });
    document.getElementById('prev').addEventListener('click', () => {
      index = (index - 1 + 2) % 2;
      slides.style.transform = `translateX(-${index * 100}%)`;
    });

    /* Modal */
    const modal = document.getElementById('fashionModal');
    const modalImg = document.getElementById('modalImage');
    const closeBtn = document.getElementById('closeModal');
    document.querySelectorAll('.popup-trigger').forEach(trigger => {
      trigger.addEventListener('click', e => {
        e.preventDefault();
        const imgSrc = trigger.getAttribute('data-img');
        modalImg.src = imgSrc || 'images/model/model-1.jpg';
        modal.style.display = 'flex';
      });
    });
    closeBtn.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', e => {
      if (e.target === modal) modal.style.display = 'none';
    });
  </script>
</body>

</html>
